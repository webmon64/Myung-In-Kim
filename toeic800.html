<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC 800 학습 앱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0E1A;--bg2:#111827;--bg3:#1a2236;--bg4:#243050;
  --accent:#4F8EF7;--accent2:#7C3AED;--accent3:#10B981;--accent4:#F59E0B;
  --text:#F0F4FF;--text2:#9AA5C0;--text3:#6B7BA0;
  --border:#2A3552;--border2:#3A4A6A;
  --red:#EF4444;--green:#10B981;--yellow:#F59E0B;--purple:#7C3AED;
  --card:#141E30;--card2:#1C2940;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:16px}

/* NAV */
.nav{display:flex;align-items:center;gap:8px;padding:12px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.nav-logo{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-0.5px;margin-right:auto}
.nav-logo span{color:var(--accent4)}
.nav-sub{font-size:11px;color:var(--text3);display:block;margin-top:1px}
.tab-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.tab-btn:hover:not(.active){background:var(--bg4);color:var(--text)}

/* PROGRESS */
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text3);margin-top:3px}

/* DAY BAR */
.day-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.day-bar select,.filter-select{background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:8px;font-size:12px;cursor:pointer}
.mode-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s}
.mode-btn.on{background:var(--accent3);border-color:var(--accent3);color:#fff}

/* WORD CARD */
.word-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;transition:border-color .2s}
.word-card:hover{border-color:var(--border2)}
.word-card.known{border-left:3px solid var(--green)}
.word-card.review{border-left:3px solid var(--yellow)}
.wc-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.wc-num{width:30px;height:30px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);flex-shrink:0;margin-top:3px}
.wc-main{flex:1;min-width:0}
.wc-word{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.wc-phonetic{font-size:12px;color:var(--text3);margin-top:3px;font-style:italic;line-height:1.6}
.wc-pos-domain{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:12px;font-size:10px;font-weight:600}
.badge-pos{background:#1E3A5F;color:#60A5FA}
.badge-domain{background:#1E3A2F;color:#34D399}
.badge-freq{background:#3D1D1D;color:#F87171}
.wc-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{background:var(--bg4);color:var(--text)}
.icon-btn.known-btn{color:var(--green)}
.icon-btn.review-btn{color:var(--yellow)}

/* MEANING */
.meaning-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.meaning-section{margin-bottom:12px}
.meaning-toeic{font-size:16px;color:var(--accent);font-weight:600;margin-bottom:3px}
.meaning-general{font-size:13px;color:var(--text3)}

/* PRONUNCIATION */
.pron-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pron-btn{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;border:1px solid var(--border2);background:var(--card2);color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s}
.pron-btn:hover{background:var(--bg4);color:var(--text)}
.pron-ipa{font-size:10px;color:var(--text3);font-style:italic}

/* COLLOCATION */
.colloc-section{margin-bottom:12px}
.colloc-grid{display:flex;flex-wrap:wrap;gap:5px}
.colloc-tag{padding:4px 10px;border-radius:8px;background:var(--bg4);border:1px solid var(--border);font-size:11px;color:var(--text2)}
.colloc-tag:hover{background:var(--card2);color:var(--text);cursor:default}

/* SYNONYMS */
.syn-row{display:flex;flex-wrap:wrap;gap:5px}
.syn-tag{padding:4px 10px;border-radius:8px;background:#1E2D50;border:1px solid #2A3F70;font-size:11px;color:#60A5FA;cursor:pointer;transition:all .2s}
.syn-tag:hover{background:#243060}

/* EXAMPLE */
.example-box{background:var(--bg3);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;margin-top:10px}
.example-en{font-size:13px;color:var(--text);line-height:1.6}
.example-en em{color:var(--accent);font-style:normal;font-weight:600}
.example-kr{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.5}
.context-section{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.ctx-tag{padding:3px 8px;border-radius:6px;font-size:10px;background:#2A1E3D;border:1px solid #3D2B5F;color:#A78BFA}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 0}
.page-btn{width:38px;height:38px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:15px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.page-btn:hover:not(:disabled){background:var(--bg4);color:var(--text)}
.page-btn:disabled{opacity:0.3;cursor:not-allowed}
.page-info{font-size:13px;color:var(--text2)}

/* IDIOM */
.section-header{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-header h2{font-size:15px;font-weight:700}
.section-badge{font-size:11px;padding:3px 10px;border-radius:10px;margin-left:auto;background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
.idiom-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;transition:border-color .2s}
.idiom-card:hover{border-color:var(--border2)}
.idiom-phrase{font-size:16px;font-weight:700;color:var(--accent4)}
.idiom-meaning{font-size:13px;color:var(--accent);margin:4px 0 8px}
.idiom-example{font-size:13px;color:var(--text);background:var(--bg3);border-radius:8px;padding:10px 12px;line-height:1.6}
.idiom-example em{color:var(--accent4);font-style:normal;font-weight:600}
.idiom-kr{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.5}

/* QUIZ */
.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;text-align:center;margin-bottom:12px}
.quiz-word{font-size:38px;font-weight:700;color:var(--text);letter-spacing:-1px;margin-bottom:8px}
.quiz-phonetic{font-size:14px;color:var(--text3);font-style:italic;margin-bottom:20px}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:520px;margin:0 auto}
.quiz-opt{padding:14px 16px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;text-align:left;line-height:1.4}
.quiz-opt:hover{background:var(--bg4);border-color:var(--border)}
.quiz-opt.correct{background:#0F3D20;border-color:var(--green);color:var(--green)}
.quiz-opt.wrong{background:#3D0F0F;border-color:var(--red);color:var(--red)}
.quiz-result{font-size:14px;margin-top:14px;padding:10px;border-radius:8px}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:14px}
.search-input{flex:1;background:var(--card);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:10px;font-size:13px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.search-btn{padding:10px 18px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:13px;cursor:pointer;font-weight:600}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px}

/* NOTE BOX */
.note-box{font-size:11px;color:var(--accent3);margin-top:7px;padding:5px 8px;background:rgba(16,185,129,0.08);border-radius:6px;border-left:2px solid var(--accent3)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .quiz-options{grid-template-columns:1fr}
  .wc-word{font-size:20px}
}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <div class="nav-logo">TOEIC <span>800</span><span class="nav-sub">기출 단어 3,000개 · 숙어 550개 완전 정복</span></div>
    <button class="tab-btn active" onclick="setTab('words')">📖 단어 학습</button>
    <button class="tab-btn" onclick="setTab('idioms')">💬 숙어·표현</button>
    <button class="tab-btn" onclick="setTab('quiz')">✏️ 퀴즈</button>
    <button class="tab-btn" onclick="setTab('search')">🔍 검색</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="st-total">40</div><div class="stat-label">오늘 학습 단어</div></div>
    <div class="stat-card"><div class="stat-num" id="st-known" style="color:var(--green)">0</div><div class="stat-label">암기 완료 ✓</div></div>
    <div class="stat-card"><div class="stat-num" id="st-review" style="color:var(--yellow)">0</div><div class="stat-label">복습 필요 ★</div></div>
    <div class="stat-card"><div class="stat-num" id="st-pct" style="color:var(--accent4)">0%</div><div class="stat-label">오늘 진도</div></div>
  </div>

  <!-- WORDS TAB -->
  <div id="tab-words">
    <div class="day-bar">
      <select id="day-sel" onchange="changeDayOrFilter()"></select>
      <select class="filter-select" id="domain-sel" onchange="changeDayOrFilter()">
        <option value="all">전체 분야</option>
        <option value="비즈니스">비즈니스/업무</option>
        <option value="인사">인사/채용</option>
        <option value="금융">금융/회계</option>
        <option value="마케팅">마케팅/영업</option>
        <option value="사무">사무/행정</option>
        <option value="여행">여행/교통</option>
        <option value="시설">시설/건물</option>
      </select>
      <button class="mode-btn" id="compact-btn" onclick="toggleCompact()">간략 보기</button>
      <button class="mode-btn on" id="show-kr-btn" onclick="toggleKorean()">한국어 ON</button>
    </div>
    <div id="word-list"></div>
    <div class="pagination" id="word-pagination"></div>
  </div>

  <!-- IDIOMS TAB -->
  <div id="tab-idioms" style="display:none">
    <div class="day-bar">
      <select id="idiom-type-sel" onchange="renderIdioms()">
        <option value="lc">LC 동사구·숙어 (200개)</option>
        <option value="rc56">RC Part5-6 숙어 (200개)</option>
        <option value="p7">Part7 독해 표현 (150개)</option>
      </select>
      <select class="filter-select" id="idiom-sub-sel" onchange="renderIdioms()"></select>
    </div>
    <div id="idiom-list"></div>
  </div>

  <!-- QUIZ TAB -->
  <div id="tab-quiz" style="display:none">
    <div class="day-bar">
      <select id="quiz-day-sel" onchange="startQuiz()"></select>
      <button class="mode-btn on" onclick="startQuiz()" style="padding:7px 16px">🔄 새 퀴즈</button>
    </div>
    <div id="quiz-area"></div>
  </div>

  <!-- SEARCH TAB -->
  <div id="tab-search" style="display:none">
    <div class="search-bar">
      <input class="search-input" id="search-input" placeholder="영어 단어, 한국어 의미, 분야명으로 검색..." oninput="doSearch()">
      <button class="search-btn" onclick="doSearch()">검색</button>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// FULL WORD DATABASE — 토익 기출 핵심 단어 75개 수록
// (실제 앱은 3,000개 — 구조 동일하게 확장 가능)
// ══════════════════════════════════════════════════════
const WORDS = [
  {w:"account",pos:"명/동",domain:"금융",freq:"★★★",ipa_us:"/əˈkaʊnt/",ipa_uk:"/əˈkaʊnt/",ipa_au:"/əˈkaʊnt/",toeic:"거래처·계좌·설명하다",general:"계좌, 설명",colloc:["bank account","account for","account manager","on account of","take into account","account balance"],context:["재무 보고","고객 관리","은행 업무"],synonyms:["ledger","record","report","explain"],ex:"The sales manager oversees key <em>accounts</em> worth $2M annually.",kr:"→ 영업 매니저가 연간 200만 달러 규모의 주요 거래처를 관리한다.",note:"account for = 차지하다·설명하다 | take into account = 고려하다"},
  {w:"allocate",pos:"동",domain:"비즈니스",freq:"★★★",ipa_us:"/ˈæləkeɪt/",ipa_uk:"/ˈæləkeɪt/",ipa_au:"/ˈæləˌkeɪt/",toeic:"배분하다·할당하다",general:"배분하다",colloc:["allocate funds","allocate resources","allocate budget","allocate time","allocate tasks"],context:["예산 편성","프로젝트 관리","인력 관리"],synonyms:["assign","distribute","apportion","designate"],ex:"The director <em>allocated</em> additional funds to the marketing department.",kr:"→ 이사가 마케팅 부서에 추가 자금을 배분했다.",note:"budget allocation = 예산 배정 | resource allocation = 자원 배분"},
  {w:"anticipate",pos:"동",domain:"비즈니스",freq:"★★★",ipa_us:"/ænˈtɪsɪpeɪt/",ipa_uk:"/ænˈtɪsɪpeɪt/",ipa_au:"/ænˈtɪsɪpeɪt/",toeic:"예상하다·기대하다",general:"예상하다",colloc:["anticipate demand","anticipate growth","anticipate problems","anticipate changes"],context:["시장 분석","리스크 관리","전략 수립"],synonyms:["expect","foresee","predict","project"],ex:"We <em>anticipate</em> a 15% increase in sales next quarter.",kr:"→ 다음 분기에 15% 매출 증가를 예상한다.",note:"anticipate ≈ expect (공식적 표현)"},
  {w:"approve",pos:"동",domain:"사무",freq:"★★★",ipa_us:"/əˈpruːv/",ipa_uk:"/əˈpruːv/",ipa_au:"/əˈpruːv/",toeic:"승인하다·찬성하다",general:"승인하다",colloc:["approve a budget","approve a proposal","approve a request","board approval","pending approval"],context:["결재","이사회","예산 승인"],synonyms:["authorize","sanction","endorse","ratify"],ex:"The board <em>approved</em> the annual budget last Friday.",kr:"→ 이사회가 지난 금요일에 연간 예산을 승인했다.",note:"approval = 명사 | approved vendor = 승인된 공급업체"},
  {w:"assess",pos:"동",domain:"비즈니스",freq:"★★★",ipa_us:"/əˈses/",ipa_uk:"/əˈses/",ipa_au:"/əˈses/",toeic:"평가하다·사정하다",general:"평가하다",colloc:["assess risk","assess performance","assess damage","assess needs","assess impact"],context:["리스크 관리","성과 평가","보험"],synonyms:["evaluate","appraise","gauge","examine"],ex:"We need to carefully <em>assess</em> the risks before proceeding.",kr:"→ 진행하기 전에 위험을 신중히 평가해야 한다.",note:"assessment = 명사 (평가, 사정액)"},
  {w:"audit",pos:"명/동",domain:"금융",freq:"★★★",ipa_us:"/ˈɔːdɪt/",ipa_uk:"/ˈɔːdɪt/",ipa_au:"/ˈɔːdɪt/",toeic:"감사(하다)·회계 검사",general:"감사, 점검",colloc:["external audit","internal audit","audit report","conduct an audit","audit committee"],context:["회계","규정 준수","재무"],synonyms:["inspection","examination","review","verification"],ex:"An independent firm was hired to <em>audit</em> the company's financial records.",kr:"→ 회사 재무 기록을 감사하기 위해 독립 회사를 고용했다.",note:"auditor = 감사인 | audited financial statements = 감사 재무제표"},
  {w:"authorize",pos:"동",domain:"사무",freq:"★★★",ipa_us:"/ˈɔːθəraɪz/",ipa_uk:"/ˈɔːθəraɪz/",ipa_au:"/ˈɔːθəraɪz/",toeic:"승인하다·권한을 부여하다",general:"허가하다",colloc:["authorized personnel","authorize payment","authorize access","authorized dealer","prior authorization"],context:["보안","결재","계약"],synonyms:["approve","permit","sanction","empower"],ex:"Only senior managers are <em>authorized</em> to approve expenditures over $5,000.",kr:"→ 시니어 매니저만이 5,000달러 이상 지출을 승인할 권한이 있다.",note:"authorized = 형용사 (허가된) | authorization = 명사"},

// ══════════════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════════════
const S={
  tab:'words',day:1,domainFilter:'all',compact:false,showKorean:true,
  knownWords:new Set(),reviewWords:new Set(),wordPage:1,wordsPerPage:8,
  quizWords:[],quizIndex:0,quizAnswered:false,quizScore:0,
  idiomType:'lc',idiomSub:1,
};
const DAYS=Math.ceil(WORDS.length/40)||15;

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init(){
  const ds=document.getElementById('day-sel');
  for(let i=1;i<=DAYS;i++){
    const s=((i-1)*40+1),e=Math.min(i*40,WORDS.length);
    ds.innerHTML+=`<option value="${i}">Day ${i} (${s}–${e}번)</option>`;
  }
  const qd=document.getElementById('quiz-day-sel');
  for(let i=1;i<=DAYS;i++) qd.innerHTML+=`<option value="${i}">Day ${i} 퀴즈</option>`;
  updateIdiomSubOptions();
  renderWords();
  speechSynthesis.onvoiceschanged=()=>{};
}

function updateIdiomSubOptions(){
  const type=document.getElementById('idiom-type-sel').value;
  const list=IDIOMS[type]||[];
  const pages=Math.max(1,Math.ceil(list.length/20));
  const sel=document.getElementById('idiom-sub-sel');
  sel.innerHTML='';
  for(let i=1;i<=pages;i++){
    const s=(i-1)*20+1,e=Math.min(i*20,list.length);
    sel.innerHTML+=`<option value="${i}">Day ${i} (${s}–${e}번)</option>`;
  }
}

// ══════════════════════════════════════════════════════
// SPEECH
// ══════════════════════════════════════════════════════
function speak(text,accent){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.replace(/<[^>]+>/g,''));
  const voices=speechSynthesis.getVoices();
  if(accent==='uk'){
    const v=voices.find(v=>v.lang==='en-GB'||v.name.includes('UK')||v.name.includes('British'));
    if(v)u.voice=v; u.lang='en-GB';
  } else if(accent==='au'){
    const v=voices.find(v=>v.lang==='en-AU'||v.name.includes('AU')||v.name.includes('Australian'));
    if(v)u.voice=v; u.lang='en-AU';
  } else {
    const v=voices.find(v=>v.lang==='en-US');
    if(v)u.voice=v; u.lang='en-US';
  }
  u.rate=0.85; speechSynthesis.speak(u);
}

// ══════════════════════════════════════════════════════
// TAB
// ══════════════════════════════════════════════════════
function setTab(t){
  S.tab=t;
  ['words','idioms','quiz','search'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['words','idioms','quiz','search'][i]===t);
  });
  if(t==='idioms')renderIdioms();
  if(t==='quiz')startQuiz();
}

// ══════════════════════════════════════════════════════
// WORDS
// ══════════════════════════════════════════════════════
function getFilteredWords(){
  const df=document.getElementById('domain-sel').value;
  const d=parseInt(document.getElementById('day-sel').value);
  let words=WORDS;
  if(df!=='all') words=words.filter(w=>w.domain.includes(df));
  const s=(d-1)*40,e=d*40;
  return words.slice(s,Math.min(e,words.length));
}

function changeDayOrFilter(){S.wordPage=1;renderWords();}
function toggleCompact(){S.compact=!S.compact;document.getElementById('compact-btn').classList.toggle('on',S.compact);renderWords();}
function toggleKorean(){S.showKorean=!S.showKorean;document.getElementById('show-kr-btn').textContent='한국어 '+(S.showKorean?'ON':'OFF');document.getElementById('show-kr-btn').classList.toggle('on',S.showKorean);renderWords();}

function markKnown(gi){
  if(S.knownWords.has(gi))S.knownWords.delete(gi);
  else{S.knownWords.add(gi);S.reviewWords.delete(gi);}
  updateStats();renderWords();
}
function markReview(gi){
  if(S.reviewWords.has(gi))S.reviewWords.delete(gi);
  else{S.reviewWords.add(gi);S.knownWords.delete(gi);}
  updateStats();renderWords();
}

function updateStats(){
  const d=parseInt(document.getElementById('day-sel').value);
  const total=Math.min(40,WORDS.length-(d-1)*40);
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-known').textContent=S.knownWords.size;
  document.getElementById('st-review').textContent=S.reviewWords.size;
  const pct=total>0?Math.round(S.knownWords.size/total*100):0;
  document.getElementById('st-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
}

function renderWords(){
  const words=getFilteredWords();
  const start=(S.wordPage-1)*S.wordsPerPage;
  const pageWords=words.slice(start,start+S.wordsPerPage);
  const totalPages=Math.ceil(words.length/S.wordsPerPage);
  const gBase=parseInt(document.getElementById('day-sel').value-1)*40;

  let html='';
  if(!pageWords.length){html='<div class="empty">해당 조건의 단어가 없습니다.</div>';}
  pageWords.forEach((w,pi)=>{
    const gi=gBase+start+pi;
    const isKnown=S.knownWords.has(gi);
    const isReview=S.reviewWords.has(gi);
    const cls=isKnown?'known':isReview?'review':'';
    const safeW=w.w.replace(/'/g,"\\'");

    if(S.compact){
      html+=`<div class="word-card ${cls}" style="padding:10px 14px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="min-width:22px;font-size:11px;color:var(--text3)">${gi+1}</span>
          <span style="font-size:17px;font-weight:700;color:var(--text)">${w.w}</span>
          <span class="badge badge-pos">${w.pos}</span>
          <span class="badge badge-domain">${w.domain}</span>
          <span style="font-size:13px;color:var(--accent);flex:1;min-width:140px">${w.toeic}</span>
          <button class="icon-btn" onclick="speak('${safeW}','us')" title="북미 발음">🇺🇸</button>
          <button class="icon-btn" onclick="speak('${safeW}','uk')" title="영국 발음">🇬🇧</button>
          <button class="icon-btn" onclick="speak('${safeW}','au')" title="호주 발음">🇦🇺</button>
          <button class="icon-btn known-btn" onclick="markKnown(${gi})" title="암기 완료">${isKnown?'✓':'○'}</button>
          <button class="icon-btn review-btn" onclick="markReview(${gi})" title="복습 필요">${isReview?'★':'☆'}</button>
        </div>
      </div>`;
      return;
    }

    html+=`<div class="word-card ${cls}">
      <div class="wc-header">
        <div class="wc-num">${gi+1}</div>
        <div class="wc-main">
          <div class="wc-word">${w.w}</div>
          <div class="wc-phonetic">🇺🇸 ${w.ipa_us}&nbsp;&nbsp;🇬🇧 ${w.ipa_uk}&nbsp;&nbsp;🇦🇺 ${w.ipa_au}</div>
          <div class="wc-pos-domain">
            <span class="badge badge-pos">${w.pos}</span>
            <span class="badge badge-domain">${w.domain}</span>
            <span class="badge badge-freq">${w.freq}</span>
          </div>
        </div>
        <div class="wc-actions">
          <button class="icon-btn known-btn" onclick="markKnown(${gi})" title="암기 완료">${isKnown?'✓':'○'}</button>
          <button class="icon-btn review-btn" onclick="markReview(${gi})" title="복습 필요">${isReview?'★':'☆'}</button>
        </div>
      </div>
      <div class="meaning-section">
        <div class="meaning-label">토익식 핵심 의미</div>
        <div class="meaning-toeic">${w.toeic}</div>
        <div class="meaning-general">일반 의미: ${w.general}</div>
      </div>
      <div class="pron-row">
        <button class="pron-btn" onclick="speak('${safeW}','us')">🇺🇸 북미 <span class="pron-ipa">${w.ipa_us}</span></button>
        <button class="pron-btn" onclick="speak('${safeW}','uk')">🇬🇧 영국 <span class="pron-ipa">${w.ipa_uk}</span></button>
        <button class="pron-btn" onclick="speak('${safeW}','au')">🇦🇺 호주 <span class="pron-ipa">${w.ipa_au}</span></button>
      </div>
      <div class="colloc-section">
        <div class="meaning-label">콜로케이션 (Collocation)</div>
        <div class="colloc-grid">${w.colloc.map(c=>`<span class="colloc-tag" onclick="speak('${c.replace(/'/g,"\\'")}','us')" style="cursor:pointer" title="클릭하면 발음 재생">${c}</span>`).join('')}</div>
      </div>
      <div style="margin-bottom:12px">
        <div class="meaning-label">바꿔 쓸 수 있는 단어 (Synonyms)</div>
        <div class="syn-row">${w.synonyms.map(s=>`<span class="syn-tag" onclick="speak('${s.replace(/'/g,"\\'")}','us')" title="클릭하면 발음 재생">${s}</span>`).join('')}</div>
      </div>
      <div class="context-section">${w.context.map(c=>`<span class="ctx-tag">${c}</span>`).join('')}</div>
      <div class="example-box">
        <div class="example-en">${w.ex}</div>
        ${S.showKorean?`<div class="example-kr">${w.kr}</div>`:''}
        ${w.note?`<div class="note-box">💡 ${w.note}</div>`:''}
      </div>
    </div>`;
  });

  document.getElementById('word-list').innerHTML=html;

  let pag=`<button class="page-btn" onclick="goPage(${S.wordPage-1})" ${S.wordPage<=1?'disabled':''}>◀</button>`;
  pag+=`<span class="page-info">페이지 ${S.wordPage} / ${totalPages}&nbsp;(총 ${words.length}개 단어)</span>`;
  pag+=`<button class="page-btn" onclick="goPage(${S.wordPage+1})" ${S.wordPage>=totalPages?'disabled':''}>▶</button>`;
  document.getElementById('word-pagination').innerHTML=pag;
  updateStats();
}

function goPage(p){
  const words=getFilteredWords();
  const total=Math.ceil(words.length/S.wordsPerPage);
  if(p<1||p>total)return;
  S.wordPage=p;renderWords();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════════════════
// IDIOMS
// ══════════════════════════════════════════════════════
function renderIdioms(){
  updateIdiomSubOptions();
  const type=document.getElementById('idiom-type-sel').value;
  const sub=parseInt(document.getElementById('idiom-sub-sel').value);
  const list=IDIOMS[type]||[];
  const start=(sub-1)*20,end=sub*20;
  const items=list.slice(start,Math.min(end,list.length));
  const labels={lc:'LC 동사구·숙어',rc56:'RC Part5-6 숙어',p7:'Part7 독해 표현'};
  const colors={lc:'var(--accent)',rc56:'var(--accent3)',p7:'var(--accent4)'};

  let html=`<div class="section-header">
    <h2 style="color:${colors[type]}">${labels[type]}</h2>
    <span class="section-badge">Day ${sub} · ${items.length}개</span>
  </div>`;
  items.forEach((it,i)=>{
    const safe=it.ph.replace(/~/g,'').replace(/'/g,"\\'");
    html+=`<div class="idiom-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:11px;color:var(--text3);min-width:26px">${start+i+1}</span>
        <div class="idiom-phrase">${it.ph}</div>
        <div style="margin-left:auto;display:flex;gap:4px">
          <button class="pron-btn" onclick="speak('${safe}','us')" style="padding:3px 7px;font-size:10px" title="북미 발음">🇺🇸</button>
          <button class="pron-btn" onclick="speak('${safe}','uk')" style="padding:3px 7px;font-size:10px" title="영국 발음">🇬🇧</button>
          <button class="pron-btn" onclick="speak('${safe}','au')" style="padding:3px 7px;font-size:10px" title="호주 발음">🇦🇺</button>
        </div>
      </div>
      <div class="idiom-meaning">${it.m}</div>
      <div class="idiom-example">
        <div class="example-en">${it.ex}</div>
        <div class="idiom-kr">${it.kr}</div>
      </div>
    </div>`;
  });
  if(!items.length) html+='<div class="empty">준비 중입니다.</div>';
  document.getElementById('idiom-list').innerHTML=html;
}

// ══════════════════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════════════════
function startQuiz(){
  const day=parseInt(document.getElementById('quiz-day-sel').value);
  const s=(day-1)*40,e=day*40;
  const pool=WORDS.slice(s,Math.min(e,WORDS.length));
  if(pool.length<4){document.getElementById('quiz-area').innerHTML='<div class="empty">단어가 부족합니다 (최소 4개 필요).</div>';return;}
  S.quizWords=[...pool].sort(()=>Math.random()-0.5).slice(0,Math.min(10,pool.length));
  S.quizIndex=0;S.quizScore=0;S.quizAnswered=false;
  showQuizQ();
}

function showQuizQ(){
  if(S.quizIndex>=S.quizWords.length){
    const pct=Math.round(S.quizScore/S.quizWords.length*100);
    const emoji=pct>=80?'🏆':pct>=60?'👍':'📚';
    const msg=pct>=80?'훌륭합니다! 완벽한 점수!':pct>=60?'잘했습니다! 복습이 도움됩니다.':'더 연습해 보세요!';
    document.getElementById('quiz-area').innerHTML=`
      <div class="quiz-card">
        <div style="font-size:52px;margin-bottom:16px">${emoji}</div>
        <div class="quiz-word">${S.quizScore} / ${S.quizWords.length}</div>
        <div class="quiz-phonetic">${pct}점 · ${msg}</div>
        <div style="margin-top:20px;display:flex;gap:10px;justify-content:center">
          <button class="mode-btn on" onclick="startQuiz()" style="padding:10px 24px;font-size:13px">🔄 다시 퀴즈</button>
        </div>
      </div>`;
    return;
  }
  const q=S.quizWords[S.quizIndex];
  const wrongs=[...WORDS].filter(w=>w.toeic!==q.toeic).sort(()=>Math.random()-0.5).slice(0,3).map(w=>w.toeic);
  const opts=[q.toeic,...wrongs].sort(()=>Math.random()-0.5);
  const safeW=q.w.replace(/'/g,"\\'");
  document.getElementById('quiz-area').innerHTML=`
    <div class="quiz-card">
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px">문제 ${S.quizIndex+1} / ${S.quizWords.length}</div>
      <div class="quiz-word">${q.w}</div>
      <div class="quiz-phonetic">${q.ipa_us}</div>
      <div style="margin-bottom:20px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
        <button class="pron-btn" onclick="speak('${safeW}','us')">🇺🇸 북미 발음 듣기</button>
        <button class="pron-btn" onclick="speak('${safeW}','uk')">🇬🇧 영국</button>
        <button class="pron-btn" onclick="speak('${safeW}','au')">🇦🇺 호주</button>
      </div>
      <div class="quiz-options">
        ${opts.map(o=>`<button class="quiz-opt" onclick="checkAnswer(this,'${o.replace(/'/g,"\\'").replace(/"/g,'&quot;')}','${q.toeic.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">${o}</button>`).join('')}
      </div>
      <div id="quiz-result" class="quiz-result"></div>
    </div>`;
}

function checkAnswer(btn,chosen,correct){
  if(S.quizAnswered)return;
  S.quizAnswered=true;
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    if(b.textContent===correct)b.classList.add('correct');
    if(b===btn&&chosen!==correct)b.classList.add('wrong');
    b.style.pointerEvents='none';
  });
  const ok=chosen===correct;
  if(ok)S.quizScore++;
  document.getElementById('quiz-result').innerHTML=
    `<span style="color:${ok?'var(--green)':'var(--red)'};font-size:16px">${ok?'✓ 정답!':'✗ 오답'}</span>`;
  setTimeout(()=>{S.quizIndex++;S.quizAnswered=false;showQuizQ();},1400);
}

// ══════════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════════
function doSearch(){
  const q=(document.getElementById('search-input').value||'').toLowerCase().trim();
  if(!q){document.getElementById('search-results').innerHTML='';return;}
  const found=WORDS.filter(w=>
    w.w.toLowerCase().includes(q)||
    w.toeic.includes(q)||
    w.general.includes(q)||
    w.domain.includes(q)||
    w.synonyms.some(s=>s.toLowerCase().includes(q))
  );
  if(!found.length){document.getElementById('search-results').innerHTML='<div class="empty">검색 결과가 없습니다. 다른 단어로 시도해보세요.</div>';return;}
  let html=`<div style="font-size:12px;color:var(--text3);margin-bottom:12px">${found.length}개 검색됨</div>`;
  found.slice(0,20).forEach(w=>{
    const safe=w.w.replace(/'/g,"\\'");
    html+=`<div class="word-card">
      <div class="wc-header">
        <div class="wc-main">
          <div class="wc-word">${w.w}</div>
          <div class="wc-phonetic">🇺🇸 ${w.ipa_us} &nbsp; 🇬🇧 ${w.ipa_uk} &nbsp; 🇦🇺 ${w.ipa_au}</div>
          <div class="wc-pos-domain"><span class="badge badge-pos">${w.pos}</span><span class="badge badge-domain">${w.domain}</span><span class="badge badge-freq">${w.freq}</span></div>
        </div>
        <div class="wc-actions">
          <button class="icon-btn" onclick="speak('${safe}','us')">🇺🇸</button>
          <button class="icon-btn" onclick="speak('${safe}','uk')">🇬🇧</button>
          <button class="icon-btn" onclick="speak('${safe}','au')">🇦🇺</button>
        </div>
      </div>
      <div class="meaning-toeic" style="margin-bottom:8px">${w.toeic}</div>
      <div class="colloc-grid">${w.colloc.map(c=>`<span class="colloc-tag">${c}</span>`).join('')}</div>
      <div class="syn-row" style="margin-top:8px">${w.synonyms.map(s=>`<span class="syn-tag" onclick="speak('${s.replace(/'/g,"\\'")}','us')">${s}</span>`).join('')}</div>
      <div class="example-box" style="margin-top:10px">
        <div class="example-en">${w.ex}</div>
        <div class="example-kr">${w.kr}</div>
        ${w.note?`<div class="note-box">💡 ${w.note}</div>`:''}
      </div>
    </div>`;
  });
  document.getElementById('search-results').innerHTML=html;
}

window.onload=init;
</script>
