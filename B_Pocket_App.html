<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>비슈케크 포켓 — 출장 영어·러시아어</title>
<style>
  :root{
    --bg:#E9EDF1; --paper:#FFFFFF; --ink:#163A5C; --ink-soft:#2E5680;
    --muted:#647082; --line:#E2E7EC; --red:#C0463E; --red-soft:#FBEDEC;
    --amber:#B7791F; --amber-soft:#FBF3E2;
    --shadow:0 1px 2px rgba(22,58,92,.06),0 8px 24px rgba(22,58,92,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Roboto,sans-serif;
    display:flex;justify-content:center;overflow:hidden}
  .phone{position:relative;width:100%;max-width:430px;height:100vh;height:100dvh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(22,58,92,.12)}
  @media(min-width:480px){.phone{height:94vh;border-radius:34px}body{align-items:center}}

  header{background:linear-gradient(135deg,#173A5C,#0F2A45);color:#fff;padding:16px 18px 12px;flex-shrink:0}
  .htop{display:flex;align-items:center;justify-content:space-between}
  .route{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.14em;color:#9FBBD6;font-weight:600}
  .title{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-top:3px}
  .title small{font-weight:500;color:#B8CCE0;font-size:12px;letter-spacing:0;margin-left:6px}
  .spd{display:flex;align-items:center;gap:9px;margin-top:11px;background:rgba(255,255,255,.10);padding:8px 12px;border-radius:12px}
  .spd label{font-size:11px;font-weight:700;color:#CFE0F0;letter-spacing:.04em;flex-shrink:0}
  .spd input[type=range]{flex:1;accent-color:#FFD9A0;height:4px}
  .spd .val{font-size:12px;font-weight:800;color:#FFD9A0;width:38px;text-align:right;flex-shrink:0}

  main{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 96px}
  .pane{display:none}
  .pane.on{display:block;animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .eyebrow{font-size:11px;letter-spacing:.16em;font-weight:700;color:var(--ink-soft);text-transform:uppercase;margin:4px 2px 8px}
  .glabel{font-size:13px;font-weight:800;color:var(--ink);margin:18px 4px 8px;display:flex;align-items:center;gap:8px}
  .glabel .dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
  .glabel.ru .dot{background:var(--ink-soft)}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .row{display:flex;align-items:center;gap:11px;padding:12px 13px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .row:last-child{border-bottom:none}
  .row:active{background:#F4F7FA}
  .row .txt{flex:1;min-width:0}
  .row .en{font-size:15.5px;font-weight:700;letter-spacing:-.01em}
  .row .en.ru{color:#173A5C;font-size:16px}
  .row .read{font-size:13px;font-weight:600;color:var(--ink-soft);margin-top:1px}
  .row .ko{font-size:12px;color:var(--muted);margin-top:2px}
  .hl{color:var(--red);font-weight:800}
  .star{font-size:17px;color:#D6DBE1;line-height:1;padding:4px;flex-shrink:0}
  .star.on{color:#E8B23E}

  .spk{flex-shrink:0;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:#F3F6F9;display:grid;place-items:center;color:var(--ink-soft);position:relative}
  .spk svg{width:18px;height:18px}
  .spk.playing{background:var(--red);border-color:var(--red);color:#fff}
  .spk.playing::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--red);opacity:.5;animation:pulse 1s ease-out infinite}
  @keyframes pulse{from{transform:scale(.85);opacity:.55}to{transform:scale(1.35);opacity:0}}

  /* pattern */
  .pat{background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden}
  .pat .ph{background:var(--red-soft);padding:11px 14px;font-size:15px;font-weight:800;color:var(--red);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
  .pat .ph .rank{background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px;flex-shrink:0;letter-spacing:.02em}
  .pat .ex{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .pat .ex:last-child{border-bottom:none}
  .pat .ex:active{background:#F4F7FA}
  .pat .ex .txt{flex:1;min-width:0}
  .pat .ex .e{font-size:14.5px;font-weight:700;color:var(--ink)}
  .pat .ex .k{font-size:12px;color:var(--muted);margin-top:1px}

  /* roleplay */
  .scene-h{font-size:15px;font-weight:800;margin:20px 4px 3px}
  .scene-sub{font-size:12px;color:var(--muted);margin:0 4px 9px}
  .turn{display:flex;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line);align-items:flex-start}
  .turn:last-child{border-bottom:none}
  .who{font-size:10px;font-weight:800;letter-spacing:.03em;color:var(--muted);width:56px;flex-shrink:0;padding-top:3px;text-transform:uppercase}
  .turn.me{background:var(--red-soft)}
  .turn.me .who{color:var(--red)}
  .bub{flex:1;min-width:0}
  .bub .en{font-size:15px;font-weight:700}
  .turn.me .bub .en{color:#8C3530}
  .bub .ko{font-size:12px;color:var(--muted);margin-top:2px}
  .cover{background:#fff;border:1px dashed var(--red);border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:700;color:var(--red);text-align:center;cursor:pointer;margin-top:2px}
  .miniplay{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:#EEF2F6;display:grid;place-items:center;color:var(--ink-soft)}
  .miniplay svg{width:14px;height:14px}
  .cheat{font-size:11.5px;color:var(--muted);margin:7px 6px 2px}
  .cheat b{color:var(--red)}

  /* plan */
  .plan-hero{background:linear-gradient(135deg,#173A5C,#24507A);color:#fff;border-radius:18px;padding:18px 16px;box-shadow:var(--shadow)}
  .plan-hero h2{margin:0 0 6px;font-size:18px}
  .plan-hero p{margin:0;font-size:13px;line-height:1.55;color:#CBDBEC}
  .pcard{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-top:10px;box-shadow:var(--shadow)}
  .pcard h3{margin:0 0 8px;font-size:13.5px;display:flex;align-items:center;gap:7px}
  .pcard h3 .n{background:var(--amber-soft);color:var(--amber);font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px}
  .pcard ul{margin:0;padding-left:17px;font-size:13px;line-height:1.6;color:#3C4654}
  .pcard ul b{color:var(--ink)}
  .wk{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .wk:last-child{border:none}
  .wk .w{font-size:12px;font-weight:800;color:var(--red);width:42px;flex-shrink:0}
  .wk .d{font-size:12.5px;color:#3C4654;line-height:1.45}
  .note{font-size:11.5px;color:var(--muted);text-align:center;margin:18px 8px 4px;line-height:1.5}

  nav{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;padding:6px 2px calc(6px + env(safe-area-inset-bottom));flex-shrink:0}
  .tab{flex:1;background:none;border:none;font:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 1px;color:#97A1AE}
  .tab svg{width:20px;height:20px}
  .tab span{font-size:9.5px;font-weight:700}
  .tab.on{color:var(--ink)}
  .tab.on svg{color:var(--red)}
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="htop">
      <div>
        <div class="route">ICN → FRU · 비슈케크</div>
        <div class="title">비슈케크 포켓 <small>탭하면 들려요</small></div>
      </div>
    </div>
    <div class="spd">
      <label>말하기 속도</label>
      <input type="range" id="rate" min="0.5" max="1.3" step="0.05" value="1">
      <span class="val" id="rateVal">1.0x</span>
    </div>
  </header>

  <main>
    <section class="pane on" id="pane-plan"></section>
    <section class="pane" id="pane-words"><div class="eyebrow">핵심 단어 · 회화 빈도 순</div><div id="words"></div><p class="note">★ 를 눌러 ‘안 나오는 단어’만 표시하며 자투리에 반복하세요.</p></section>
    <section class="pane" id="pane-pat"><div class="eyebrow">만능 패턴 100 · 예문 3개씩</div><div id="pats"></div></section>
    <section class="pane" id="pane-rp"><div class="eyebrow">롤플레이 · 거래편 15 + 대화편 8</div><div id="rp"></div></section>
    <section class="pane" id="pane-ru"><div class="eyebrow">여행 러시아어 · 강세는 빨간 발음</div><div id="ruList"></div><p class="note">비슈케크 일상어는 러시아어입니다. 막히면 단어 + “빠좔루스타”!</p></section>
  </main>
  <nav id="nav"></nav>
</div>

<script>
/* ===== speech ===== */
let voices=[], rate=1;
function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function pickVoice(lang){ const p=lang.slice(0,2).toLowerCase(); return voices.find(v=>v.lang.toLowerCase().startsWith(p))||null; }
let curBtn=null;
function stopPulse(){ if(curBtn){curBtn.classList.remove("playing");curBtn=null;} }
function speak(text,lang,btn){
  if(!window.speechSynthesis){ alert("이 브라우저는 음성합성을 지원하지 않습니다."); return; }
  speechSynthesis.cancel(); stopPulse();
  const u=new SpeechSynthesisUtterance(text); u.lang=lang; u.rate=rate;
  const v=pickVoice(lang); if(v) u.voice=v;
  if(btn){ btn.classList.add("playing"); curBtn=btn; }
  u.onend=stopPulse; u.onerror=stopPulse;
  speechSynthesis.speak(u);
}

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function spkBtn(text,lang){const b=el("button","spk",spkSVG);b.onclick=e=>{e.stopPropagation();speak(text,lang,b);};return b;}

// WORDS
const wEl=document.getElementById("words");
WORDS.forEach(grp=>{
  wEl.appendChild(el("div","glabel",'<span class="dot"></span>'+grp.g));
  const card=el("div","card");
  grp.items.forEach(([en,ko])=>{
    const row=el("div","row");
    const star=el("div","star","★");star.onclick=e=>{e.stopPropagation();star.classList.toggle("on");};
    const txt=el("div","txt",'<div class="en">'+en+'</div><div class="ko">'+ko+'</div>');
    const b=spkBtn(en,"en-US"); row.onclick=()=>speak(en,"en-US",b);
    row.append(star,txt,b); card.appendChild(row);
  });
  wEl.appendChild(card);
});

// PATTERNS
const pEl=document.getElementById("pats");
PATS.forEach(o=>{
  if(o.sec){ pEl.appendChild(el("div","glabel",'<span class="dot"></span>'+o.sec)); return; }
  const pat=el("div","pat");
  pat.appendChild(el("div","ph",(o.n?'<span class="rank">'+o.n+'</span>':'')+o.p));
  o.ex.forEach(([en,ko])=>{
    const ex=el("div","ex");
    const txt=el("div","txt",'<div class="e">'+en+'</div><div class="k">'+ko+'</div>');
    const mp=el("div","miniplay",playSVG);
    ex.onclick=()=>speak(en,"en-US",null);
    mp.onclick=e=>{e.stopPropagation();speak(en,"en-US",null);};
    ex.append(txt,mp); pat.appendChild(ex);
  });
  pEl.appendChild(pat);
});

// ROLEPLAY
const rEl=document.getElementById("rp");
SCENES.forEach(sc=>{
  rEl.appendChild(el("div","scene-h",sc.h));
  rEl.appendChild(el("div","scene-sub",sc.sub));
  const card=el("div","card");
  sc.turns.forEach(tn=>{
    const turn=el("div","turn"+(tn.me?" me":""));
    const who=el("div","who",tn.who);
    const bub=el("div","bub");
    if(tn.me){
      bub.innerHTML='<div class="ko">'+tn.ko+'</div>';
      const cover=el("div","cover","탭하여 영어 확인 + 듣기");
      cover.onclick=()=>{bub.innerHTML='<div class="en">'+tn.en+'</div><div class="ko">'+tn.ko+'</div>';speak(tn.en,"en-US",null);};
      bub.appendChild(cover); turn.append(who,bub);
    }else{
      bub.innerHTML='<div class="en">'+tn.en+'</div><div class="ko">'+tn.ko+'</div>';
      const mp=el("div","miniplay",playSVG); mp.onclick=()=>speak(tn.en,"en-US",null);
      turn.append(who,bub,mp);
    }
    card.appendChild(turn);
  });
  rEl.appendChild(card);
  rEl.appendChild(el("div","cheat","<b>치트키</b>  "+sc.cheat));
});

});
