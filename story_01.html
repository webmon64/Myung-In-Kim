const SPEED_STEPS = [
  { label: "1×", mult: 1.0 },
  { label: "1.2×", mult: 1.2 },
  { label: "1.5×", mult: 1.5 },
  { label: "2×", mult: 2.0 },
];

/* ── Voice selector ── */
function selectVoice(profile) {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  for (const name of profile.priority) {
    const v = voices.find((v) => v.name.toLowerCase().includes(name.toLowerCase()));
    if (v) return v;
  }
  if (profile.gender === "female") {
    const f = voices.find((v) => v.name.toLowerCase().includes("female") && v.lang.startsWith("en"));
    if (f) return f;
  } else {
    const m = voices.find((v) => v.name.toLowerCase().includes("male") && v.lang.startsWith("en"));
    if (m) return m;
  }
  return voices.find((v) => v.lang === profile.fallbackLang)
    || voices.find((v) => v.lang.startsWith("en"))
    || voices[0];
}

function App() {

  const [voiceId, setVoiceId] = useState("meryl");
  const [speedIdx, setSpeedIdx] = useState(0);       // index into SPEED_STEPS

  /* ── Navigation ── */
  const [currentChapter, setCurrentChapter] = useState(0);
  const [currentSentence, setCurrentSentence] = useState(0);
  const [mode, setMode] = useState("study"); // "study" | "shadow"

  /* ── Study state ── */
  const [showTranslation, setShowTranslation] = useState({});
  const [completedSentences, setCompletedSentences] = useState({});
  const [activeCard, setActiveCard] = useState(null);
  const [isSpeaking, setIsSpeaking] = useState(false);
  const [isRecording, setIsRecording] = useState(false);
  const [audioURL, setAudioURL] = useState(null);

  /* ── Shadow mode ── */
  const [shadowPlaying, setShadowPlaying] = useState(false);
  const [shadowIndex, setShadowIndex] = useState(-1);

  /* ── Voice info ── */
  const [voiceReady, setVoiceReady] = useState(false);
  const [detectedVoiceName, setDetectedVoiceName] = useState("");

  const synth = useRef(window.speechSynthesis);
  const shadowTimeoutRef = useRef(null);
  const mediaRecorderRef = useRef(null);
  const audioChunksRef = useRef([]);
  const sentenceRefs = useRef([]);

  const profile = VOICE_PROFILES[voiceId];
  const chapter = CHAPTERS[currentChapter];
  const sentence = chapter.sentences[currentSentence];
  const totalSentences = chapter.sentences.length;
  const completedCount = Object.keys(completedSentences).filter((k) => k.startsWith(`${currentChapter}-`)).length;
  const chapterProgress = Math.round((completedCount / totalSentences) * 100);
  const effectiveRate = profile.baseRate * SPEED_STEPS[speedIdx].mult;

  /* ── Voice init ── */
  useEffect(() => {
    const tryLoad = () => {
      const voices = window.speechSynthesis.getVoices();
      if (voices.length > 0) {
        setVoiceReady(true);
        const v = selectVoice(profile);
        setDetectedVoiceName(v ? v.name : "");
      }
    };
    window.speechSynthesis.onvoiceschanged = tryLoad;
    tryLoad();
    return () => { synth.current.cancel(); clearTimeout(shadowTimeoutRef.current); };
  }, []);

  /* Update detected voice name when profile changes */
  useEffect(() => {
    if (voiceReady) {
      const v = selectVoice(VOICE_PROFILES[voiceId]);
      setDetectedVoiceName(v ? v.name : "");
    }
  }, [voiceId, voiceReady]);

  /* Scroll to highlighted sentence in shadow mode */
  useEffect(() => {
    if (mode === "shadow" && shadowIndex >= 0 && sentenceRefs.current[shadowIndex]) {
      sentenceRefs.current[shadowIndex].scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }, [shadowIndex, mode]);

  /* ── Core speak ── */
  const speak = useCallback((text, onEnd, overrideRate) => {
    synth.current.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    const curProfile = VOICE_PROFILES[voiceId];
    const voice = selectVoice(curProfile);
    if (voice) utter.voice = voice;
    utter.rate = overrideRate !== undefined ? overrideRate : curProfile.baseRate * SPEED_STEPS[speedIdx].mult;
    utter.pitch = curProfile.pitch;
    utter.lang = "en-US";
    utter.onstart = () => setIsSpeaking(true);
    utter.onend = () => { setIsSpeaking(false); if (onEnd) onEnd(); };
    utter.onerror = () => setIsSpeaking(false);
    synth.current.speak(utter);
  }, [voiceId, speedIdx]);

  /* ── Study helpers ── */
  const handleSpeak = () => {
    speak(sentence.en);
    setCompletedSentences((p) => ({ ...p, [`${currentChapter}-${currentSentence}`]: true }));
  };

  const toggleTrans = (key) => setShowTranslation((p) => ({ ...p, [key]: !p[key] }));

  const goNext = () => {
    setCompletedSentences((p) => ({ ...p, [`${currentChapter}-${currentSentence}`]: true }));
    if (currentSentence < totalSentences - 1) { setCurrentSentence((s) => s + 1); setAudioURL(null); setActiveCard(null); }
  };
  const goPrev = () => {
    if (currentSentence > 0) { setCurrentSentence((s) => s - 1); setAudioURL(null); setActiveCard(null); }
  };
  const selectChapter = (idx) => {
    setCurrentChapter(idx); setCurrentSentence(0); setAudioURL(null); setActiveCard(null);
    stopShadow();
  };

  /* ── Shadow helpers ── */
  const startShadow = useCallback(() => {
    setShadowPlaying(true);
    setShadowIndex(0);
    let idx = 0;
    const sents = CHAPTERS[currentChapter].sentences;
    const curProfile = VOICE_PROFILES[voiceId];
    const rate = curProfile.baseRate * SPEED_STEPS[speedIdx].mult;
    const next = () => {
      if (idx >= sents.length) { setShadowPlaying(false); setShadowIndex(-1); return; }
      setShadowIndex(idx);
      speak(sents[idx].en, () => { shadowTimeoutRef.current = setTimeout(() => { idx++; next(); }, 800); }, rate);
    };
    next();
  }, [currentChapter, voiceId, speedIdx, speak]);

  const stopShadow = () => {
    synth.current.cancel(); clearTimeout(shadowTimeoutRef.current);
    setShadowPlaying(false); setShadowIndex(-1);
  };
  const enterShadow = () => { setMode("shadow"); stopShadow(); };
  const exitShadow = () => { stopShadow(); setMode("study"); };

  /* ── Recording ── */
  const startRecording = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorderRef.current = new MediaRecorder(stream);
      audioChunksRef.current = [];
      mediaRecorderRef.current.ondataavailable = (e) => audioChunksRef.current.push(e.data);
      mediaRecorderRef.current.onstop = () => {
        setAudioURL(URL.createObjectURL(new Blob(audioChunksRef.current, { type: "audio/webm" })));
        stream.getTracks().forEach((t) => t.stop());
      };
      mediaRecorderRef.current.start();
      setIsRecording(true);
    } catch { alert("마이크 권한이 필요합니다. 브라우저 설정에서 마이크를 허용해 주세요."); }
  };
  const stopRecording = () => { mediaRecorderRef.current?.stop(); setIsRecording(false); };

  /* ── Derived colors ── */
  const ac = profile.accentColor;
  const acL = profile.accentLight;
  const acBg = voiceId === "meryl" ? "rgba(196,164,114,0.10)" : "rgba(80,120,192,0.10)";
  const acBorder = voiceId === "meryl" ? "rgba(196,164,114,0.30)" : "rgba(80,120,192,0.30)";
  const navy = "#1c2840";
  const textMid = voiceId === "meryl" ? "#584030" : "#304058";
  const textMuted = voiceId === "meryl" ? "#9a7a55" : "#607090";
  const cardBg = "rgba(255,255,255,0.90)";
  const borderColor = voiceId === "meryl" ? "rgba(185,158,122,0.22)" : "rgba(100,140,200,0.22)";
  const highlightBg = voiceId === "meryl" ? "rgba(255,215,100,0.30)" : "rgba(100,160,255,0.22)";
  const highlightBorder = voiceId === "meryl" ? "rgba(200,160,50,0.55)" : "rgba(80,130,220,0.55)";

  const tranKey = `${currentChapter}-${currentSentence}`;

  /* ── Speed controller component (reusable) ── */
  const SpeedBar = () => (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <span style={{ fontSize: 10, color: textMuted, fontFamily: "sans-serif", letterSpacing: 1, textTransform: "uppercase" }}>Speed</span>
      <div style={{ display: "flex", gap: 3, background: "rgba(0,0,0,0.04)", borderRadius: 50, padding: 3, border: `1px solid ${borderColor}` }}>
        {SPEED_STEPS.map((s, i) => (
          <button key={i} onClick={() => setSpeedIdx(i)} style={{ padding: "4px 11px", borderRadius: 50, border: "none", background: i === speedIdx ? ac : "transparent", color: i === speedIdx ? "white" : textMuted, fontFamily: "sans-serif", fontSize: 11.5, fontWeight: i === speedIdx ? "bold" : "normal", cursor: "pointer", transition: "all 0.18s" }}>
            {s.label}
          </button>
        ))}
      </div>
    </div>
  );

  /* ════════════════════════════════════════════════════
     RENDER
  ════════════════════════════════════════════════════ */
  return (
    <div style={{ minHeight: "100vh", background: profile.bgGrad, fontFamily: "'Georgia','Times New Roman',serif", color: "#2a1e10", transition: "background 0.5s ease" }}>

      {/* ══ HEADER ══ */}
      <header style={{ background: "rgba(255,255,255,0.82)", backdropFilter: "blur(16px)", borderBottom: `1px solid ${borderColor}`, position: "sticky", top: 0, zIndex: 100, transition: "border-color 0.4s" }}>

        {/* Top row */}
        <div style={{ padding: "10px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
          <div>
            <div style={{ fontSize: 9, letterSpacing: 3.5, color: textMuted, textTransform: "uppercase", fontFamily: "sans-serif", marginBottom: 2 }}>Magic Tree House · Interactive Edition</div>
            <div style={{ fontSize: 17, fontWeight: "bold", color: navy, letterSpacing: 0.3 }}>Dinosaurs Before Dark</div>
          </div>

          {/* ── VOICE SELECTOR ── */}
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <span style={{ fontSize: 10, color: textMuted, fontFamily: "sans-serif", letterSpacing: 1, textTransform: "uppercase" }}>Voice</span>
            <div style={{ display: "flex", gap: 4, background: "rgba(0,0,0,0.04)", borderRadius: 50, padding: 4, border: `1px solid ${borderColor}` }}>
              {Object.values(VOICE_PROFILES).map((p) => {
                const isActive = voiceId === p.id;
                return (
                  <button key={p.id} onClick={() => { synth.current.cancel(); setVoiceId(p.id); stopShadow(); }} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 16px", borderRadius: 50, border: "none", background: isActive ? p.accentColor : "transparent", color: isActive ? "white" : textMuted, fontFamily: "sans-serif", fontSize: 12, fontWeight: isActive ? "bold" : "normal", cursor: "pointer", transition: "all 0.22s", whiteSpace: "nowrap" }}>
                    <span style={{ fontSize: 14 }}>{p.emoji}</span>
                    <div>
                      <div style={{ fontSize: 11.5, fontWeight: "bold", lineHeight: 1.2 }}>{p.label}</div>
                      <div style={{ fontSize: 9.5, opacity: 0.8, lineHeight: 1 }}>{p.sub}</div>
                    </div>
                  </button>
                );
              })}
            </div>

            {/* Voice status badge */}
            <div style={{ display: "flex", alignItems: "center", gap: 5, background: acBg, borderRadius: 20, padding: "5px 11px", border: `1px solid ${acBorder}` }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: voiceReady ? "#5aad5a" : "#ccc" }} />
              <span style={{ fontSize: 10, color: textMuted, fontFamily: "sans-serif", maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {voiceReady ? detectedVoiceName || "Ready" : "Loading..."}
              </span>
            </div>
          </div>
        </div>

        {/* Bottom row — mode tabs + speed */}
        <div style={{ padding: "0 24px 10px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
          {/* Mode tabs */}
          <div style={{ display: "flex", background: "rgba(0,0,0,0.04)", borderRadius: 50, padding: 3, border: `1px solid ${borderColor}`, gap: 2 }}>
            {[["study", "📘 문장 학습"], ["shadow", "🎙 따라 읽기"]].map(([m, label]) => (
              <button key={m} onClick={() => m === "shadow" ? enterShadow() : exitShadow()} style={{ padding: "6px 17px", borderRadius: 50, border: "none", background: mode === m ? ac : "transparent", color: mode === m ? "white" : textMuted, fontFamily: "sans-serif", fontSize: 12, fontWeight: mode === m ? "bold" : "normal", cursor: "pointer", transition: "all 0.2s", whiteSpace: "nowrap" }}>
                {label}
              </button>
            ))}
          </div>
          <SpeedBar />
        </div>
      </header>

      <div style={{ display: "flex", minHeight: "calc(100vh - 110px)" }}>

        {/* ══ SIDEBAR ══ */}
        <aside style={{ width: 200, background: "rgba(255,255,255,0.60)", borderRight: `1px solid ${borderColor}`, padding: "16px 0", flexShrink: 0, overflowY: "auto", position: "sticky", top: 110, height: "calc(100vh - 110px)", transition: "border-color 0.4s" }}>
          <div style={{ padding: "0 13px 8px", fontSize: 9, letterSpacing: 3, color: textMuted, textTransform: "uppercase", fontFamily: "sans-serif" }}>Chapters</div>
          {CHAPTERS.map((ch, idx) => {
            const done = Object.keys(completedSentences).filter((k) => k.startsWith(`${idx}-`)).length;
            const pct = Math.round((done / ch.sentences.length) * 100);
            const isActive = idx === currentChapter;
            return (
              <button key={ch.id} onClick={() => selectChapter(idx)} style={{ width: "100%", textAlign: "left", padding: "8px 13px", background: isActive ? (voiceId === "meryl" ? "rgba(158,118,64,0.12)" : "rgba(42,80,144,0.12)") : "transparent", border: "none", borderLeft: isActive ? `3px solid ${ac}` : "3px solid transparent", cursor: "pointer", transition: "all 0.18s" }}>
                <div style={{ fontSize: 9, color: textMuted, fontFamily: "sans-serif", marginBottom: 1 }}>Ch.{ch.id}</div>
                <div style={{ fontSize: 12, color: isActive ? navy : textMid, fontWeight: isActive ? "bold" : "normal", marginBottom: 4 }}>{ch.title}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <div style={{ flex: 1, height: 3, background: "rgba(0,0,0,0.08)", borderRadius: 2, overflow: "hidden" }}>
                    <div style={{ width: `${pct}%`, height: "100%", background: ac, borderRadius: 2, transition: "width 0.4s" }} />
                  </div>
                  <span style={{ fontSize: 9, color: textMuted, fontFamily: "sans-serif" }}>{pct}%</span>
                </div>
              </button>
            );
          })}
        </aside>

        {/* ══ MAIN ══ */}
        <main style={{ flex: 1, padding: "26px 30px", maxWidth: 820, overflowY: "auto" }}>

          {/* Chapter header */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 9, color: textMuted, letterSpacing: 2.5, textTransform: "uppercase", fontFamily: "sans-serif", marginBottom: 4 }}>Chapter {chapter.id}</div>
            <h1 style={{ fontSize: 24, color: navy, margin: "0 0 12px", fontWeight: "bold", letterSpacing: 0.4 }}>{chapter.title}</h1>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ flex: 1, height: 5, background: "rgba(0,0,0,0.08)", borderRadius: 4, overflow: "hidden" }}>
                <div style={{ width: `${chapterProgress}%`, height: "100%", background: `linear-gradient(to right,${acL},${ac})`, borderRadius: 4, transition: "width 0.5s ease" }} />
              </div>
              <span style={{ fontSize: 11, color: textMuted, fontFamily: "sans-serif" }}>{completedCount}/{totalSentences}</span>
            </div>
          </div>

          {/* ══════ SHADOW MODE ══════ */}
          {mode === "shadow" && (
            <div>
              {/* Controls */}
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 22, padding: "14px 20px", background: cardBg, borderRadius: 14, border: `1px solid ${borderColor}`, flexWrap: "wrap", gap: 10 }}>
                <div style={{ display: "flex", gap: 8 }}>
                  {!shadowPlaying ? (
                    <button onClick={startShadow} style={{ display: "flex", alignItems: "center", gap: 7, padding: "10px 22px", borderRadius: 50, background: `linear-gradient(135deg,${ac},${acL})`, border: "none", color: "white", fontFamily: "sans-serif", fontSize: 13, fontWeight: "bold", cursor: "pointer", boxShadow: `0 4px 16px ${ac}44` }}>
                      ▶ 전체 재생
                    </button>
                  ) : (
                    <button onClick={stopShadow} style={{ display: "flex", alignItems: "center", gap: 7, padding: "10px 22px", borderRadius: 50, background: "#c03a3a", border: "none", color: "white", fontFamily: "sans-serif", fontSize: 13, fontWeight: "bold", cursor: "pointer" }}>
                      ⏹ 중지
                    </button>
                  )}
                  <button onClick={exitShadow} style={{ padding: "10px 18px", borderRadius: 50, border: `1.5px solid ${borderColor}`, background: "transparent", color: textMuted, fontFamily: "sans-serif", fontSize: 12, cursor: "pointer" }}>
                    ← 문장 학습
                  </button>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11.5, color: textMid, fontFamily: "sans-serif", fontWeight: "bold" }}>
                    {shadowPlaying ? `🔊 ${shadowIndex + 1} / ${totalSentences} 문장 재생 중` : "▶ 재생 버튼으로 전체 챕터를 이어서 들어보세요"}
                  </div>
                  <div style={{ fontSize: 10, color: textMuted, fontFamily: "sans-serif", marginTop: 2 }}>
                    {profile.emoji} {profile.label} · rate {effectiveRate.toFixed(2)} · pitch {profile.pitch} · 문장 클릭시 개별 재생
                  </div>
                </div>
                <SpeedBar />
              </div>

              {/* Story book */}
              <div style={{ background: cardBg, borderRadius: 20, padding: "38px 44px", border: `1px solid ${borderColor}`, boxShadow: "0 6px 32px rgba(0,0,0,0.06)" }}>
                <div style={{ textAlign: "center", marginBottom: 28 }}>
                  <div style={{ fontSize: 12, letterSpacing: 8, color: acL, opacity: 0.7 }}>· · · ·</div>
                  <div style={{ fontSize: 10, color: textMuted, fontFamily: "sans-serif", marginTop: 5, letterSpacing: 1.5, textTransform: "uppercase" }}>Chapter {chapter.id} — {chapter.title}</div>
                </div>

                {chapter.sentences.map((s, si) => {
                  const isActive = si === shadowIndex;
                  return (
                    <div key={si} ref={(el) => (sentenceRefs.current[si] = el)} onClick={() => speak(s.en)} style={{ marginBottom: 16, padding: "13px 18px", borderRadius: 12, background: isActive ? highlightBg : "transparent", border: isActive ? `1.5px solid ${highlightBorder}` : "1.5px solid transparent", transition: "all 0.30s ease", cursor: "pointer" }}>
                      <p style={{ fontSize: 17, lineHeight: 1.88, color: isActive ? "#1a1008" : textMid, margin: 0, fontStyle: "italic", fontWeight: isActive ? "bold" : "normal", letterSpacing: 0.2, transition: "all 0.26s" }}>
                        {s.en}
                      </p>
                      {isActive && (
                        <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${borderColor}`, fontSize: 13.5, color: voiceId === "meryl" ? "#4a3010" : "#203050", lineHeight: 1.65, fontFamily: "sans-serif", fontStyle: "normal" }}>
                          {s.kr}
                        </div>
                      )}
                    </div>
                  );
                })}

                <div style={{ textAlign: "center", marginTop: 28 }}>
                  <div style={{ fontSize: 12, letterSpacing: 8, color: acL, opacity: 0.7 }}>· · · ·</div>
                </div>
              </div>
            </div>
          )}

          {/* ══════ STUDY MODE ══════ */}
          {mode === "study" && (
            <>
              {/* Sentence dots */}
              <div style={{ display: "flex", gap: 6, marginBottom: 18, flexWrap: "wrap" }}>
                {chapter.sentences.map((_, si) => {
                  const k = `${currentChapter}-${si}`;
                  const done = completedSentences[k];
                  const isActive = si === currentSentence;
                  return (
                    <button key={si} onClick={() => { setCurrentSentence(si); setAudioURL(null); setActiveCard(null); }} style={{ width: 32, height: 32, borderRadius: "50%", border: isActive ? `2px solid ${ac}` : "1.5px solid rgba(0,0,0,0.12)", background: isActive ? ac : done ? (voiceId === "meryl" ? "#e8ddd0" : "#d0ddf0") : "white", color: isActive ? "white" : done ? (voiceId === "meryl" ? "#7a6040" : "#305080") : "#b0a090", fontFamily: "sans-serif", fontSize: 12, cursor: "pointer", fontWeight: isActive ? "bold" : "normal", transition: "all 0.18s" }}>
                      {si + 1}
                    </button>
                  );
                })}
              </div>

              {/* Main sentence card */}
              <div style={{ background: cardBg, borderRadius: 20, padding: "24px 28px", border: `1px solid ${borderColor}`, boxShadow: "0 4px 24px rgba(0,0,0,0.06)", marginBottom: 14 }}>
                <p style={{ fontSize: 18.5, lineHeight: 1.88, color: "#1c1208", margin: "0 0 18px", fontStyle: "italic", letterSpacing: 0.2 }}>
                  {sentence.en}
                </p>

                {/* Action buttons */}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                  <button onClick={handleSpeak} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 17px", borderRadius: 50, border: `1.5px solid ${acL}`, background: isSpeaking ? ac : acBg, color: isSpeaking ? "white" : textMid, fontFamily: "sans-serif", fontSize: 12.5, cursor: "pointer", fontWeight: 600, transition: "all 0.2s" }}>
                    🔊 {isSpeaking ? "Playing..." : "Listen & Repeat"}
                  </button>
                  <button onClick={() => toggleTrans(tranKey)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 17px", borderRadius: 50, border: "1.5px solid rgba(100,160,100,0.30)", background: showTranslation[tranKey] ? "rgba(80,150,80,0.10)" : "rgba(100,160,100,0.07)", color: "#3a6a42", fontFamily: "sans-serif", fontSize: 12.5, cursor: "pointer", fontWeight: 600, transition: "all 0.2s" }}>
                    🇰🇷 {showTranslation[tranKey] ? "해석 숨기기" : "해석 보기"}
                  </button>
                  <button onClick={isRecording ? stopRecording : startRecording} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 17px", borderRadius: 50, border: isRecording ? "1.5px solid rgba(192,60,60,0.40)" : "1.5px solid rgba(130,90,192,0.30)", background: isRecording ? "rgba(192,60,60,0.09)" : "rgba(130,90,192,0.09)", color: isRecording ? "#b83030" : "#604888", fontFamily: "sans-serif", fontSize: 12.5, cursor: "pointer", fontWeight: 600, transition: "all 0.2s" }}>
                    {isRecording ? "⏹ 녹음 중지" : "🎙️ 내 발음 확인"}
                  </button>
                </div>

                {/* Speed info line */}
                <div style={{ fontSize: 10.5, color: textMuted, fontFamily: "sans-serif", marginBottom: showTranslation[tranKey] || audioURL ? 12 : 0 }}>
                  {profile.emoji} {profile.label} · {SPEED_STEPS[speedIdx].label} · rate {effectiveRate.toFixed(2)}
                </div>

                {/* Translation */}
                {showTranslation[tranKey] && (
                  <div style={{ background: "rgba(80,150,80,0.08)", borderLeft: "3px solid #70b870", borderRadius: "0 12px 12px 0", padding: "12px 17px", marginTop: 12, fontSize: 14.5, color: "#253a25", lineHeight: 1.78, fontFamily: "sans-serif" }}>
                    {sentence.kr}
                  </div>
                )}

                {/* Audio playback */}
                {audioURL && (
                  <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: "rgba(130,90,192,0.08)", borderRadius: 10, border: "1px solid rgba(130,90,192,0.25)", marginTop: 12 }}>
                    <span style={{ fontSize: 11, color: "#604888", fontFamily: "sans-serif" }}>내 발음:</span>
                    <audio controls src={audioURL} style={{ flex: 1, height: 30 }} />
                  </div>
                )}
              </div>

              {/* Learning cards */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 11, marginBottom: 17 }}>
                {/* Vocab */}
                <div onClick={() => setActiveCard(activeCard === "vocab" ? null : "vocab")} style={{ background: activeCard === "vocab" ? "rgba(255,255,255,0.97)" : cardBg, borderRadius: 14, padding: "14px 16px", border: activeCard === "vocab" ? `1.5px solid ${ac}` : `1px solid ${borderColor}`, cursor: "pointer", transition: "all 0.2s", boxShadow: activeCard === "vocab" ? `0 4px 16px ${ac}22` : "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                    <span style={{ fontSize: 15 }}>📖</span>
                    <span style={{ fontSize: 11, fontWeight: "bold", color: textMid, letterSpacing: 0.3, fontFamily: "sans-serif" }}>핵심 어휘</span>
                    <span style={{ marginLeft: "auto", fontSize: 10, color: acL }}>{activeCard === "vocab" ? "▲" : "▼"}</span>
                  </div>
                  {activeCard === "vocab"
                    ? sentence.vocab.map((v, vi) => (
                      <div key={vi} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "6px 0", borderBottom: vi < sentence.vocab.length - 1 ? `1px solid ${borderColor}` : "none" }}>
                        <span style={{ fontStyle: "italic", fontSize: 14, color: navy, fontWeight: "bold" }}>{v.word}</span>
                        <span style={{ fontSize: 12, color: textMid, fontFamily: "sans-serif" }}>{v.meaning}</span>
                      </div>
                    ))
                    : <div style={{ fontSize: 11.5, color: textMuted, fontFamily: "sans-serif" }}>{sentence.vocab.map((v) => v.word).join("  ·  ")}</div>
                  }
                </div>

                {/* Grammar */}
                <div onClick={() => setActiveCard(activeCard === "grammar" ? null : "grammar")} style={{ background: activeCard === "grammar" ? "rgba(255,255,255,0.97)" : cardBg, borderRadius: 14, padding: "14px 16px", border: activeCard === "grammar" ? "1.5px solid #6888b8" : `1px solid ${borderColor}`, cursor: "pointer", transition: "all 0.2s", boxShadow: activeCard === "grammar" ? "0 4px 16px rgba(70,100,170,0.12)" : "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                    <span style={{ fontSize: 15 }}>✏️</span>
                    <span style={{ fontSize: 11, fontWeight: "bold", color: "#384a60", letterSpacing: 0.3, fontFamily: "sans-serif" }}>핵심 문법</span>
                    <span style={{ marginLeft: "auto", fontSize: 10, color: "#8098b8" }}>{activeCard === "grammar" ? "▲" : "▼"}</span>
                  </div>
                  <div style={{ fontSize: 12, fontWeight: "bold", color: "#384a60", marginBottom: activeCard === "grammar" ? 6 : 0, fontFamily: "sans-serif" }}>{sentence.grammar.point}</div>
                  {activeCard === "grammar" && <div style={{ fontSize: 12, color: "#3a4858", lineHeight: 1.75, fontFamily: "sans-serif" }}>{sentence.grammar.explain}</div>}
                </div>
              </div>

              {/* Navigation */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <button onClick={goPrev} disabled={currentSentence === 0} style={{ padding: "9px 20px", borderRadius: 50, border: `1.5px solid ${acL}`, background: "transparent", color: currentSentence === 0 ? "#ccc" : textMid, cursor: currentSentence === 0 ? "not-allowed" : "pointer", fontFamily: "sans-serif", fontSize: 12, fontWeight: 600 }}>← 이전</button>
                <button onClick={enterShadow} style={{ padding: "9px 18px", borderRadius: 50, border: `1.5px solid ${acL}`, background: acBg, color: ac, fontFamily: "sans-serif", fontSize: 12, fontWeight: "bold", cursor: "pointer" }}>🎙 따라 읽기 모드</button>
                <button onClick={goNext} disabled={currentSentence === totalSentences - 1} style={{ padding: "9px 20px", borderRadius: 50, border: `1.5px solid ${acL}`, background: currentSentence === totalSentences - 1 ? "transparent" : acBg, color: currentSentence === totalSentences - 1 ? "#ccc" : textMid, cursor: currentSentence === totalSentences - 1 ? "not-allowed" : "pointer", fontFamily: "sans-serif", fontSize: 12, fontWeight: 600 }}>다음 →</button>
              </div>

              {/* Chapter complete */}
              {completedCount === totalSentences && (
                <div style={{ background: "rgba(80,150,80,0.09)", border: "1px solid rgba(80,150,80,0.28)", borderRadius: 14, padding: "14px 20px", textAlign: "center", color: "#3a6a42" }}>
                  <div style={{ fontSize: 18, marginBottom: 3 }}>🌿</div>
                  <div style={{ fontSize: 14, fontWeight: "bold", marginBottom: 3 }}>챕터 완료!</div>
                  <div style={{ fontSize: 11, fontFamily: "sans-serif" }}>상단 <strong>🎙 따라 읽기</strong> 탭으로 전환해 전체를 완성해보세요</div>
                </div>
              )}
            </>
          )}
        </main>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
